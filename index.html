<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>📺 Ghost TV Pro</title>

    <!-- ========== CSS ========== -->
    <style>
        /* ─── রিসেট ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e17;
            color: #f1f5f9;
            padding-bottom: 70px;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* ─── স্ক্রলবার ─── */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e50914;
            border-radius: 10px;
        }

        /* ─── হেডার ─── */
        header {
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 8px;
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #e50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            -webkit-text-fill-color: initial;
            color: #e50914;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header-right .user-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .header-right .user-badge i {
            color: #4ade80;
        }
        .header-right .user-badge .logout-btn {
            background: none;
            border: none;
            color: #8a94a6;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            transition: 0.2s;
        }
        .header-right .user-badge .logout-btn:hover {
            color: #e50914;
        }

        .login-btn {
            background: #e50914;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 16px rgba(229, 9, 20, 0.25);
        }
        .login-btn:hover {
            transform: scale(1.04);
            background: #ff1a2a;
        }

        .adult-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #8a94a6;
        }
        .adult-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #e50914;
            cursor: pointer;
        }

        /* ─── ট্যাব ─── */
        .tabs {
            display: flex;
            gap: 4px;
            background: #141c2b;
            border-radius: 40px;
            padding: 4px;
            margin: 12px 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow-x: auto;
            flex-wrap: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: #8a94a6;
            font-size: 13px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.25s ease;
            white-space: nowrap;
            text-align: center;
        }
        .tab-btn i {
            margin-right: 5px;
        }
        .tab-btn.active {
            background: #e50914;
            color: #fff;
            box-shadow: 0 4px 16px rgba(229, 9, 20, 0.3);
        }
        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        #tab-adult {
            display: none;
        }

        /* ─── সার্চ ─── */
        .search-bar {
            margin: 12px 12px 0;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(20, 28, 43, 0.8);
            color: #f1f5f9;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .search-bar input:focus {
            border-color: #e50914;
            box-shadow: 0 0 0 3px rgba(229, 9, 14, 0.15);
        }
        .search-bar input::placeholder {
            color: #5a6a80;
        }
        .search-bar i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a6a80;
        }

        /* ─── কন্টেন্ট ─── */
        .content {
            padding: 16px 12px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .category-section {
            margin-bottom: 28px;
        }
        .category-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            padding-left: 4px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .category-title .count {
            background: #e50914;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            color: #fff;
        }
        .category-title .premium-badge {
            background: #f59e0b;
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 800;
        }
        .scroll-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 2px 12px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-row::-webkit-scrollbar {
            display: none;
        }

        /* ─── পোস্টার ─── */
        .poster {
            flex: 0 0 130px;
            max-width: 130px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border-radius: 14px;
            overflow: hidden;
            background: #141c2b;
            border: 2px solid transparent;
            position: relative;
        }
        .poster:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(229, 9, 14, 0.3);
        }
        .poster .premium-tag {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #f59e0b;
            color: #000;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
            z-index: 2;
        }
        .poster .fav-heart {
            position: absolute;
            bottom: 38px;
            right: 4px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 2px 8px;
            font-size: 12px;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            z-index: 2;
        }
        .poster img {
            width: 100%;
            aspect-ratio: 2 / 2.8;
            object-fit: cover;
            display: block;
            background: #1a2233;
        }
        .poster .name {
            padding: 6px 6px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            color: #e2e8f0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 36px;
        }
        @media (min-width: 640px) {
            .poster {
                flex: 0 0 160px;
                max-width: 160px;
            }
            .poster .name {
                font-size: 14px;
                padding: 8px 8px 10px;
                min-height: 44px;
            }
        }
        @media (min-width: 1024px) {
            .poster {
                flex: 0 0 180px;
                max-width: 180px;
            }
        }

        /* ─── লোডার ─── */
        .loader {
            text-align: center;
            padding: 40px 0;
            color: #6a7f9e;
        }
        .loader i {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
            color: #e50914;
        }

        /* ─── ভিডিও মোডাল (JW Player) ─── */
        #videoModal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
        }
        #videoModal.active {
            display: flex;
        }
        .modal-header {
            width: 100%;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            flex-shrink: 0;
            z-index: 10;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            max-width: 80%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f1f5f9;
        }
        .modal-header button {
            background: none;
            border: none;
            color: #9aa3b5;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 10px;
            transition: 0.2s;
        }
        .modal-header button:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .jw-player-container {
            width: 100%;
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #jwplayer {
            width: 100%;
            height: 100%;
            min-height: 200px;
            background: #000;
        }
        /* JW Player-এর ফুলস্ক্রিনে ভিডিও পুরো স্ক্রিন জুড়ে fill করার জন্য */
        .jwplayer.jw-flag-fullscreen .jw-media video {
            object-fit: fill !important;
        }
        /* সাধারণ মোডেও fill রাখতে চাইলে */
        .jwplayer .jw-media video {
            object-fit: fill !important;
        }

        /* ─── প্রিমিয়াম পে-ওয়াল ওভারলে ─── */
        .premium-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .premium-overlay i {
            font-size: 48px;
            color: #f59e0b;
            margin-bottom: 12px;
        }
        .premium-overlay h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .premium-overlay p {
            font-size: 14px;
            color: #c8d0dc;
            max-width: 300px;
            margin-bottom: 16px;
        }
        .premium-overlay .btn-premium {
            background: #e50914;
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.3);
        }
        .premium-overlay .btn-premium:hover {
            transform: scale(1.04);
            background: #ff1a2a;
        }

        /* ─── স্ট্যাটাস বার ─── */
        .status-bar {
            text-align: center;
            color: #6a7f9e;
            font-size: 13px;
            padding: 8px 0 4px;
            background: #0a0e17;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .status-bar .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #3a4555;
            transition: 0.3s;
        }
        .status-bar .dot.live {
            background: #4ade80;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ─── লগইন মোডাল ─── */
        #loginModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #loginModal.active {
            display: flex;
        }
        .login-card {
            background: #141c2b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        .login-card .close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            background: none;
            border: none;
            color: #8a94a6;
            font-size: 22px;
            cursor: pointer;
        }
        .login-card .close-btn:hover {
            color: #fff;
        }
        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #f1f5f9;
            text-align: center;
        }
        .login-card .sub {
            text-align: center;
            color: #8a94a6;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-card label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #9aa3b5;
            margin-bottom: 4px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.4);
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            margin-bottom: 16px;
        }
        .login-card input:focus {
            border-color: #e50914;
            box-shadow: 0 0 0 3px rgba(229, 9, 14, 0.15);
        }
        .login-card input::placeholder {
            color: #5a6a80;
        }
        .login-card .login-error {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .login-card .login-btn-submit {
            width: 100%;
            padding: 14px;
            background: #e50914;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
        }
        .login-card .login-btn-submit:hover {
            background: #ff1a2a;
        }
        .login-card .register-link {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
            color: #8a94a6;
        }
        .login-card .register-link a {
            color: #e50914;
            font-weight: 600;
            cursor: pointer;
        }

        /* ─── রেস্পন্সিভ ─── */
        @media (max-width: 480px) {
            .poster {
                flex: 0 0 100px;
                max-width: 100px;
            }
            .poster .name {
                font-size: 10px;
                padding: 4px 4px 6px;
                min-height: 28px;
            }
            .logo {
                font-size: 16px;
            }
            .tab-btn {
                font-size: 11px;
                padding: 6px 10px;
                min-width: 60px;
            }
            .modal-header h3 {
                font-size: 14px;
            }
            .header-right .user-badge {
                font-size: 11px;
                padding: 2px 8px 2px 6px;
            }
            .login-btn {
                font-size: 11px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ═══ হেডার ═══ -->
    <header>
        <div class="logo"><i class="fas fa-ghost"></i> Ghost TV Pro</div>
        <div class="header-right">
            <div class="adult-toggle">
                <input type="checkbox" id="adultToggle" />
                <label for="adultToggle">🔞 18+</label>
            </div>
            <div id="authArea">
                <button class="login-btn" onclick="openLoginModal()"><i class="fas fa-user-lock"></i> লগইন</button>
            </div>
        </div>
    </header>

    <!-- ═══ সার্চ ═══ -->
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ভিডিও বা চ্যানেল সার্চ করুন..." oninput="handleSearch(this.value)" />
    </div>

    <!-- ═══ ট্যাব ═══ -->
    <div class="tabs" id="tabContainer">
        <button class="tab-btn active" data-tab="movie"><i class="fas fa-film"></i> মুভি</button>
        <button class="tab-btn" data-tab="livetv"><i class="fas fa-tv"></i> লাইভ টিভি</button>
        <button class="tab-btn" id="tab-adult" data-tab="adult"><i class="fas fa-exclamation-triangle"></i> 18+</button>
        <button class="tab-btn" data-tab="favorites"><i class="fas fa-heart"></i> ফেভারিট</button>
    </div>

    <!-- ═══ কন্টেন্ট ═══ -->
    <div class="content" id="contentArea">
        <div class="loader"><i class="fas fa-spinner fa-spin"></i> লোড হচ্ছে...</div>
    </div>

    <!-- ═══ স্ট্যাটাস ═══ -->
    <div class="status-bar">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">সংযোগ স্থাপন করা হচ্ছে...</span>
    </div>

    <!-- ═══ ভিডিও মোডাল (JW Player) ═══ -->
    <div id="videoModal">
        <div class="modal-header">
            <h3 id="modalTitle">ভিডিও</h3>
            <button onclick="closeVideoModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="jw-player-container" id="jwContainer">
            <div id="jwplayer"></div>
            <!-- প্রিমিয়াম ওভারলে (JS দিয়ে কন্ট্রোল) -->
            <div class="premium-overlay" id="premiumOverlay" style="display:none;">
                <i class="fas fa-crown"></i>
                <h2>🔒 প্রিমিয়াম কন্টেন্ট</h2>
                <p>এই ভিডিওটি দেখতে প্রিমিয়াম সাবস্ক্রিপশন প্রয়োজন। লগইন করে সাবস্ক্রিপশন নিন।</p>
                <button class="btn-premium" onclick="openLoginModal()">লগইন করুন</button>
            </div>
        </div>
    </div>

    <!-- ═══ লগইন মোডাল ═══ -->
    <div id="loginModal">
        <div class="login-card">
            <button class="close-btn" onclick="closeLoginModal()">✕</button>
            <h2><i class="fas fa-user-shield" style="color:#e50914;"></i> লগইন</h2>
            <p class="sub">প্রিমিয়াম কন্টেন্ট দেখতে লগইন করুন</p>
            <div class="login-error" id="loginError">ভুল ইউজারনেম বা পাসওয়ার্ড</div>
            <label>ইউজারনেম</label>
            <input type="text" id="loginUser" placeholder="আপনার ইউজারনেম" />
            <label>পাসওয়ার্ড</label>
            <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" />
            <button class="login-btn-submit" onclick="handleLogin()">লগইন করুন</button>
            <div class="register-link">
                নতুন? <a onclick="alert('💬 সাবস্ক্রিপশন নিতে ইনবক্স করুন: +8801907293620')">সাবস্ক্রাইব করুন</a>
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- ========== JW Player ========== -->
    <!-- JW Player ফ্রি টায়ার (ওয়াটারমার্ক থাকবে) – নিজের লাইব্রেরি আইডি বসান -->
    <script src="https://cdn.jwplayer.com/libraries/YOUR_JW_LIBRARY_ID.js"></script>

    <!-- ========== Main Script ========== -->
    <script>
        // =====================================================
        //  কনফিগারেশন – আপনার JSONBin তথ্য ও JW লাইব্রেরি আইডি
        // =====================================================
        const CONFIG = {
            // JSONBin

        // =====================================================
        //  JSONBin ডেটা ফেচ
        // =====================================================
        async function fetchData() {
            try {
                setStatus('সংযোগ স্থাপন…', false);
                const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
                    headers: { 'X-Master-Key': CONFIG.API_KEY, 'X-Bin-Meta': 'false' }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();

                // ডেটা স্ট্রাকচার: { movie: [...], livetv: [...], adult: [...], users: [...], slider: [...] }
                allData = {
                    movie: data.movie || [],
                    livetv: data.livetv || [],
                    adult: data.adult || [],
                    users: data.users || [],
                    slider: data.slider || []
                };

                // adult ট্যাব দেখানো/লুকানো
                const hasAdult = allData.adult && allData.adult.length > 0;
                document.getElementById('tab-adult').style.display = hasAdult ? 'block' : 'none';

                // ফেভারিট লোড
                loadFavorites();

                setStatus('✅ ডেটা লোড হয়েছে', true);
                renderTab(currentTab);

            } catch (err) {
                console.error('JSONBin error:', err);
                setStatus(`❌ লোড ব্যর্থ: ${err.message}`, false);
                content.innerHTML =
                `<div class="loader"><i class="fas fa-exclamation-triangle" style="color:#e50914;"></i> ডেটা লোড করা যায়নি</div>`;
            }
        }

        // =====================================================
        //  ফেভারিট (লোকাল স্টোরেজ)
        // =====================================================
        function loadFavorites() {
            try {
                const saved = localStorage.getItem('ghost_favorites');
                favorites = saved ? JSON.parse(saved) : [];
            } catch (e) { favorites = []; }
        }

        function saveFavorites() {
            localStorage.setItem('ghost_favorites', JSON.stringify(favorites));
        }

        function toggleFavorite(movie) {
            if (!movie || !movie.link) return;
            const idx = favorites.findIndex(f => f.link === movie.link);
            if (idx > -1) {
                favorites.splice(idx, 1);
                showToast('💔 ফেভারিট থেকে রিমুভ');
            } else {
                favorites.push({ name: movie.name, link: movie.link, logo: movie.logo || '' });
                showToast('❤️ ফেভারিটে যুক্ত');
            }
            saveFavorites();
            // রি-রেন্ডার
            if (currentTab === 'favorites') renderTab('favorites');
            else renderTab(currentTab);
        }

        function isFavorite(link) {
            return favorites.some(f => f.link === link);
        }

        // =====================================================
        //  ইউজার অথেন্টিকেশন
        // =====================================================
        async function verifyUser(username, password) {
            try {
                const users = allData.users || [];
                const user = users.find(u => u.username === username && u.password === password);
                if (!user) {
                    loginError.style.display = 'block';
                    loginError.textContent = 'ভুল ইউজারনেম বা পাসওয়ার্ড!';
                    return false;
                }

                // মেয়াদ শেষ?
                const today = new Date();
                const expiry = new Date(user.expiry);
                if (expiry < today) {
                    loginError.style.display = 'block';
                    loginError.textContent = 'আপনার অ্যাকাউন্টের মেয়াদ শেষ!';
                    return false;
                }

                // ডিভাইস চেক
                const deviceId = localStorage.getItem('ghost_device_id') || 'device_' + Math.random().toString(36)
                .substring(2, 10);
                localStorage.setItem('ghost_device_id', deviceId);

                if (user.device_id && user.device_id !== '' && user.device_id !== deviceId) {
                    loginError.style.display = 'block';
                    loginError.textContent = 'এই অ্যাকাউন্ট অন্য ডিভাইসে লগইন করা আছে!';
                    return false;
                }

                // ডিভাইস আইডি সেট না থাকলে সেট করি
                if (!user.device_id || user.device_id === '') {
                    user.device_id = deviceId;
                    // JSONBin আপডেট (ব্যাকগ্রাউন্ডে)
                    updateUserDevice(user.username, deviceId);
                }

                currentUser = user;
                localStorage.setItem('ghost_user', username);
                localStorage.setItem('ghost_pass', password);
                updateAuthUI();
                closeLoginModal();
                showToast('✅ লগইন সফল!');
                return true;

            } catch (e) {
                loginError.style.display = 'block';
                loginError.textContent = 'সার্ভার ত্রুটি!';
                return false;
            }
        }

        async function updateUserDevice(username, deviceId) {
            try {
                // সরল PUT – ডেটা পুরো আপডেট করতে হবে
                const res = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.API_KEY },
                    body: JSON.stringify(allData)
                });
                if (!res.ok) console.warn('ডিভাইস আপডেট ব্যর্থ');
            } catch (e) { console.warn(e); }
        }

        function checkAutoLogin() {
            const savedUser = localStorage.getItem('ghost_user');
            const savedPass = localStorage.getItem('ghost_pass');
            if (savedUser && savedPass) {
                // অটো লগইন – ইউজার ডেটা মিলিয়ে দেখি
                const user = (allData.users || []).find(u => u.username === savedUser && u.password === savedPass);
                if (user) {
                    const today = new Date();
                    const expiry = new Date(user.expiry);
                    if (expiry >= today) {
                        currentUser = user;
                        updateAuthUI();
                        return true;
                    }
                }
                // না হলে ক্লিয়ার
                localStorage.removeItem('ghost_user');
                localStorage.removeItem('ghost_pass');
            }
            return false;
        }

        // =====================================================
        //  JW Player ইনিশিয়ালাইজ
        // =====================================================
        function initJWPlayer(movie) {
            if (jwInstance) {
                jwInstance.remove();
                jwInstance = null;
            }

            const container = document.getElementById('jwplayer');
            // JW Player লাইব্রেরি লোড হয়েছে কিনা চেক
            if (typeof jwplayer === 'undefined') {
                showToast('⚠️ JW Player লাইব্রেরি লোড হয়নি। লাইব্রেরি আইডি চেক করুন।');
                return;
            }

            jwInstance = jwplayer('jwplayer');
            jwInstance.setup({
                file: movie.link,
                title: movie.name || 'ভিডিও',
                width: '100%',
                height: '100%',
                primary: 'html5',
                autostart: true,
                controls: true,
                // ফুলস্ক্রিনে ভিডিও পুরো স্ক্রিন জুড়ে fill
                stretching: 'exactfit', // exactfit = পুরো স্ক্রিন পূরণ করে (অনুপাত ভাঙে)
                preload: 'auto',
                playbackRateControls: [0.75, 1, 1.25, 1.5, 2],
                // লাইভ স্ট্রিমের জন্য
                repeat: false,
            });

            // ফুলস্ক্রিন ইভেন্ট – নিশ্চিত করি যে stretching কাজ করছে
            jwInstance.on('fullscreen', function(state) {
                // JW Player ফুলস্ক্রিনে স্টাইল ঠিক করতে
                const videoEl = document.querySelector('.jwplayer .jw-media video');
                if (videoEl) {
                    if (state.fullscreen) {
                        videoEl.style.objectFit = 'fill';
                    } else {
                        videoEl.style.objectFit = 'fill';
                    }
                }
            });

            // প্লেব্যাক রেডি
            jwInstance.on('ready', function() {
                setStatus('▶️ প্লেব্যাক শুরু', true);
                premiumOverlay.style.display = 'none';
            });

            jwInstance.on('error', function(err) {
                console.warn('JW Player error:', err);
                setStatus('❌ প্লেব্যাক ত্রুটি', false);
            });

            // প্রিমিয়াম চেক
            if (movie.premium && !currentUser) {
                premiumOverlay.style.display = 'flex';
                jwInstance.pause();
            } else if (movie.premium && currentUser && !currentUser.premium) {
                premiumOverlay.style.display = 'flex';
                jwInstance.pause();
            } else {
                premiumOverlay.style.display = 'none';
            }

            // ফুলস্ক্রিনে ভিডিও fill করতে CSS force
            setTimeout(() => {
                const videoEl = document.querySelector('.jwplayer .jw-media video');
                if (videoEl) {
                    videoEl.style.objectFit = 'fill';
                }
            }, 100);
        }

        function updatePremiumOverlay() {
            if (!currentPlayingMovie) return;
            if (currentPlayingMovie.premium && (!currentUser || !currentUser.premium)) {
                premiumOverlay.style.display = 'flex';
                if (jwInstance) jwInstance.pause();
            } else {
                premiumOverlay.style.display = 'none';
                if (jwInstance) jwInstance.play();
            }
        }

        // =====================================================
        //  ভিডিও মোডাল কন্ট্রোল
        // =====================================================
        function openVideoModal(movie) {
            if (!movie || !movie.link) return;
            currentPlayingMovie = movie;
            modalTitle.textContent = movie.name || 'ভিডিও';

            // JW Player পুনরায় সেটআপ
            videoModal.classList.add('active');
            // একটু delay দিয়ে জেডব্লিউ লোড করি
            setTimeout(() => {
                initJWPlayer(movie);
            }, 100);

            // Escape key
            document.addEventListener('keydown', closeOnEscape);
        }

        function closeVideoModal() {
            videoModal.classList.remove('active');
            if (jwInstance) {
                jwInstance.remove();
                jwInstance = null;
            }
            currentPlayingMovie = null;
            document.removeEventListener('keydown', closeOnEscape);
            // প্রিমিয়াম ওভারলে লুকাও
            premiumOverlay.style.display = 'none';
        }

        function closeOnEscape(e) {
            if (e.key === 'Escape') closeVideoModal();
        }

        // =====================================================
        //  রেন্ডার ফাংশন
        // =====================================================
        function renderTab(tab) {
            currentTab = tab;
            isSearchMode = false;
            searchInput.value = '';

            if (tab === 'favorites') {
                renderFavorites();
                return;
            }

            const categories = allData[tab] || [];
            if (!categories.length) {
                content.innerHTML =
                    `<div class="loader"><i class="fas fa-inbox"></i> এই বিভাগে কোনো কন্টেন্ট নেই</div>`;
                return;
            }

            let html = '';
            categories.forEach(cat => {
                if (!cat.movies || cat.movies.length === 0) return;
                const premiumCount = cat.movies.filter(m => m.premium).length;
                html += `
                            <div class="category-section">
                                <div class="category-title">
                                    ${cat.name || 'শিরোনামহীন'}
                                    <span class="count">${cat.movies.length}</span>
                                    ${premiumCount > 0 ? `<span class="premium-badge">⭐ ${premiumCount} প্রিমিয়াম</span>` : ''}
                                </div>
                                <div class="scroll-row">
                        `;
                cat.movies.forEach(movie => {
                    html += createPosterHTML(movie);
                });
                html += `</div></div>`;
            });

            content.innerHTML = html;
            attachPosterEvents();
        }

        function renderFavorites() {
            if (!favorites.length) {
                content.innerHTML =
                    `<div class="loader"><i class="fas fa-heart-broken" style="color:#ef4444;"></i> ফেভারিট লিস্ট ফাঁকা</div>`;
                return;
            }
            let html = `<div class="category-section">
                            <div class="category-title">❤️ ফেভারিট <span class="count">${favorites.length}</span></div>
                            <div class="scroll-row">`;
            favorites.forEach(movie => {
                // ফেভারিটে প্রিমিয়াম স্ট্যাটাস নেই, ধরে নিই সব ফ্রি
                const m = { ...movie, premium: false };
                html += createPosterHTML(m);
            });
            html += `</div></div>`;
            content.innerHTML = html;
            attachPosterEvents();
        }

        function createPosterHTML(movie) {
            const isFav = isFavorite(movie.link);
            const premiumTag = movie.premium ? `<span class="premium-tag">⭐ VIP</span>` : '';
            const favIcon = isFav ? `<span class="fav-heart"><i class="fas fa-heart"></i></span>` : '';
            const imgSrc = movie.logo || 'https://picsum.photos/seed/' + encodeURIComponent(movie.link || Math.random()) +
                '/400/300';
            return `
                        <div class="poster" data-link="${encodeURIComponent(movie.link)}" data-name="${encodeURIComponent(movie.name || '')}" data-logo="${encodeURIComponent(movie.logo || '')}" data-premium="${movie.premium ? 'true' : 'false'}">
                            ${premiumTag}
                            ${favIcon}
                            <img src="${imgSrc}" alt="${movie.name || ''}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${Math.random()}/400/300'">
                            <div class="name">${movie.name || ''}</div>
                        </div>
                    `;
        }

        function attachPosterEvents() {
            document.querySelectorAll('.poster').forEach(el => {
                el.addEventListener('click', function() {
                    const link = decodeURIComponent(this.dataset.link);
                    const name = decodeURIComponent(this.dataset.name || '');
                    const logo = decodeURIComponent(this.dataset.logo || '');
                    const premium = this.dataset.premium === 'true';
                    const movie = { name, link, logo, premium };
                    // যদি প্রিমিয়াম হয় এবং ইউজার লগইন না থাকে অথবা প্রিমিয়াম না হয়
                    if (premium && (!currentUser || !currentUser.premium)) {
                        showToast('🔒 এই কন্টেন্ট প্রিমিয়াম! লগইন করুন।');
                        openLoginModal();
                        return;
                    }
                    openVideoModal(movie);
                });

                // লং প্রেস = ফেভারিট টগল
                let pressTimer;
                el.addEventListener('mousedown', function(e) {
                    pressTimer = setTimeout(() => {
                        const link = decodeURIComponent(this.dataset.link);
                        const name = decodeURIComponent(this.dataset.name || '');
                        const logo = decodeURIComponent(this.dataset.logo || '');
                        const premium = this.dataset.premium === 'true';
                        toggleFavorite({ name, link, logo, premium });
                    }, 600);
                });
                el.addEventListener('mouseup', () => clearTimeout(pressTimer));
                el.addEventListener('mouseleave', () => clearTimeout(pressTimer));
                el.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(() => {
                        const link = decodeURIComponent(this.dataset.link);
                        const name = decodeURIComponent(this.dataset.name || '');
                        const logo = decodeURIComponent(this.dataset.logo || '');
                        const premium = this.dataset.premium === 'true';
                        toggleFavorite({ name, link, logo, premium });
                    }, 600);
                }, { passive: true });
                el.addEventListener('touchend', () => clearTimeout(pressTimer));
            });
        }

        // =====================================================
        //  সার্চ
        // =====================================================
        function handleSearch(query) {
            const txt = query.trim().toLowerCase();
            if (!txt) {
                isSearchMode = false;
                renderTab(currentTab);
                return;
            }
            isSearchMode = true;

            let results = [];
            ['movie', 'livetv', 'adult'].forEach(type => {
                const cats = allData[type] || [];
                cats.forEach(cat => {
                    if (cat.movies) {
                        cat.movies.forEach(m => {
                            if (m.name && m.name.toLowerCase().includes(txt)) {
                                if (!results.some(r => r.link === m.link)) {
                                    results.push({ ...m, _category: cat.name, _type: type });
                                }
                            }
                        });
                    }
                });
            });

            if (!results.length) {
                content.innerHTML =
                    `<div class="loader"><i class="fas fa-search-minus"></i> "${query}" এর জন্য কিছু পাওয়া যায়নি</div>`;
                return;
            }

            let html = `<div class="category-section">
                            <div class="category-title">🔍 সার্চ রেজাল্ট: "${query}" <span class="count">${results.length}</span></div>
                            <div class="scroll-row">`;
            results.forEach(m => {
                html += createPosterHTML(m);
            });
            html += `</div></div>`;
            content.innerHTML = html;
            attachPosterEvents();
        }

        // =====================================================
        //  ট্যাব সুইচ
        // =====================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
            renderTab(tab);
        }

        // =====================================================
        //  ইনিশিয়ালাইজ
        // =====================================================
        async function init() {
            // JW Player লাইব্রেরি চেক
            if (typeof jwplayer === 'undefined') {
                showToast('⚠️ JW Player লাইব্রেরি আইডি সেট করুন!');
                setStatus('❌ JW Player লাইব্রেরি পাওয়া যায়নি', false);
            }

            // ডেটা ফেচ
            await fetchData();

            // অটো লগইন
            checkAutoLogin();

            // অ্যাডাল্ট টগল
            const savedAdult = localStorage.getItem('ghost_adult_visible') === 'true';
            document.getElementById('adultToggle').checked = savedAdult;
            adultVisible = savedAdult;
            document.getElementById('tab-adult').style.display = savedAdult ? 'block' : 'none';

            // ট্যাব ইভেন্ট
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    if (tab === 'adult' && !document.getElementById('adultToggle').checked) {
                        document.getElementById('adultToggle').checked = true;
                        document.getElementById('adultToggle').dispatchEvent(new Event('change'));
                        setTimeout(() => {
                            if (document.getElementById('adultToggle').checked) switchTab('adult');
                        }, 100);
                        return;
                    }
                    switchTab(tab);
                });
            });

            // অ্যাডাল্ট টগল ইভেন্ট
            document.getElementById('adultToggle').addEventListener('change', function() {
                adultVisible = this.checked;
                localStorage.setItem('ghost_adult_visible', adultVisible ? 'true' : 'false');
                const tabAdult = document.getElementById('tab-adult');
                tabAdult.style.display = adultVisible ? 'block' : 'none';
                if (!adultVisible && currentTab === 'adult') switchTab('movie');
                // রি-রেন্ডার
                renderTab(currentTab);
            });

            // লগইন মোডালে Enter কী
            document.getElementById('loginPass').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('loginUser').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') document.getElementById('loginPass').focus();
            });

            // ফুলস্ক্রিন চেঞ্জ ইভেন্ট – ভিডিও fill রাখতে
            document.addEventListener('fullscreenchange', function() {
                const videoEl = document.querySelector('.jwplayer .jw-media video');
                if (videoEl) {
                    videoEl.style.objectFit = 'fill';
                }
            });
            document.addEventListener('webkitfullscreenchange', function() {
                const videoEl = document.querySelector('.jwplayer .jw-media video');
                if (videoEl) {
                    videoEl.style.objectFit = 'fill';
                }
            });

            // উইন্ডো রিসাইজ
            window.addEventListener('resize', function() {
                const videoEl = document.querySelector('.jwplayer .jw-media video');
                if (videoEl) {
                    videoEl.style.objectFit = 'fill';
                }
            });

            // প্রিমিয়াম ওভারলে বাটন – লগইন মোডাল খোলা
            document.querySelector('#premiumOverlay .btn-premium')?.addEventListener('click', function() {
                openLoginModal();
            });

            console.log('🚀 Ghost TV Pro initialized');
            console.log('🔑 JW Library:', CONFIG.JW_LIBRARY);
            console.log('📦 JSONBin ID:', CONFIG.BIN_ID);
        }

        // DOM লোড হলে শুরু
        document.addEventListener('DOMContentLoaded', init);

        // গ্লোবাল ফাংশন (HTML-এ ব্যবহারের জন্য)
        window.openVideoModal = openVideoModal;
        window.closeVideoModal = closeVideoModal;
        window.openLoginModal = openLoginModal;
        window.closeLoginModal = closeLoginModal;
        window.handleLogin = handleLogin;
        window.handleSearch = handleSearch;
        window.toggleFavorite = toggleFavorite;
        window.handleImageError = handleImageError;
    </script>

</body>
</html>
